<svg width="360" height="260" viewBox="0 0 360 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .screen { fill: #111827; stroke: #38bdf8; stroke-width: 3; }
    .panel { fill: #0f172a; stroke: #334155; stroke-width: 2; }
    .bot { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 3; }
    .eye { fill: #0ea5e9; animation: blink 4s infinite; transform-origin: center; }
    .line { stroke-linecap: round; stroke-width: 5; animation: glow 2.6s infinite ease-in-out; }
    .cursor { fill: #facc15; animation: cursor 1s infinite; }
    .spark { fill: #a78bfa; animation: float 3s infinite ease-in-out; }
    .spark:nth-of-type(2) { animation-delay: .7s; }
    .spark:nth-of-type(3) { animation-delay: 1.2s; }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(.15); }
    }
    @keyframes glow {
      0%, 100% { opacity: .45; }
      50% { opacity: 1; }
    }
    @keyframes cursor {
      0%, 45% { opacity: 1; }
      46%, 100% { opacity: 0; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: .45; }
      50% { transform: translateY(-9px); opacity: 1; }
    }
  </style>

  <rect x="24" y="38" width="312" height="184" rx="18" class="screen"/>
  <rect x="44" y="58" width="128" height="144" rx="12" class="panel"/>
  <rect x="188" y="58" width="128" height="144" rx="12" class="panel"/>

  <path d="M93 96h30c17 0 30 13 30 30v26c0 17-13 30-30 30H93c-17 0-30-13-30-30v-26c0-17 13-30 30-30Z" class="bot"/>
  <path d="M108 96V76" stroke="#38bdf8" stroke-width="5" stroke-linecap="round"/>
  <circle cx="108" cy="70" r="7" fill="#38bdf8"/>
  <rect x="85" y="122" width="46" height="30" rx="14" fill="#082f49"/>
  <circle cx="99" cy="137" r="5" class="eye"/>
  <circle cx="118" cy="137" r="5" class="eye"/>
  <path d="M96 162c8 6 18 6 26 0" stroke="#0ea5e9" stroke-width="4" stroke-linecap="round"/>

  <path d="M206 88h72" class="line" stroke="#22d3ee"/>
  <path d="M206 112h52" class="line" stroke="#a78bfa"/>
  <path d="M206 136h82" class="line" stroke="#34d399"/>
  <path d="M206 160h38" class="line" stroke="#facc15"/>
  <rect x="252" y="151" width="9" height="18" rx="3" class="cursor"/>

  <circle cx="304" cy="42" r="5" class="spark"/>
  <circle cx="42" cy="42" r="4" class="spark"/>
  <circle cx="326" cy="214" r="4" class="spark"/>
</svg>
